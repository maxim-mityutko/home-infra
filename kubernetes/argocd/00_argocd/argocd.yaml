---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "17"
spec:
  destination:
    name: in-cluster
    namespace: argocd
  source:
    path: kubernetes/cluster/argocd
    repoURL: 'https://github.com/maxim-mityutko/home-infra.git'
    targetRevision:  main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
