apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blocky
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  destination:
    name: in-cluster
    namespace: default
  source:
    path: kubernetes/cluster/default/blocky
    repoURL: 'https://github.com/maxim-mityutko/home-infra.git'
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: blocky-omada-customdns
      jsonPointers:
        - /data
        - /metadata/annotations/omada.brhd.io~1hash
    - group: ""
      kind: ConfigMap
      name: blocky-omada-clientlookup
      jsonPointers:
        - /data
        - /metadata/annotations/omada.brhd.io~1hash
    - group: apps
      kind: StatefulSet
      name: blocky
      jsonPointers:
        - /spec/template/metadata/annotations
