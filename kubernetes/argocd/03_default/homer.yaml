apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "31"
spec:
  destination:
    name: in-cluster
    namespace: default
  source:
    path: kubernetes/cluster/default/homer
    repoURL: 'https://github.com/maxim-mityutko/home-infra.git'
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: false