apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tuya-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  destination:
    name: in-cluster
    namespace: smart-home
  source:
    path: kubernetes/cluster/smart-home/tuya-gateway
    repoURL: 'https://github.com/maxim-mityutko/home-infra.git'
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true