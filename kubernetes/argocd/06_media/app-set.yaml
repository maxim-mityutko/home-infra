apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: media
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  generators:
    - git:
        repoURL: https://github.com/maxim-mityutko/home-infra.git
        revision: main
        directories:
          - path: kubernetes/cluster/media/*
          - path: kubernetes/cluster/media/x-media-shared
            exclude: true
  template:
    metadata:
      name: "{{path.basename}}"
      annotations:
        argocd.argoproj.io/manifest-generate-paths: ".;.."
        argocd.argoproj.io/sync-wave: "7"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      labels:
        group: media
    spec:
      project: default
      source:
        repoURL: https://github.com/maxim-mityutko/home-infra.git
        targetRevision: main
        path: "{{path}}"
      destination:
        namespace: media
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
      ignoreDifferences:
        - group: apps
          kind: Deployment
          name: stash
          jsonPointers:
            - /spec/replicas  # On-demand scaling
