apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: exportarr
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "16"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    group: media
spec:
  destination:
    name: in-cluster
    namespace: media
  source:
    path: kubernetes/cluster/media/exportarr
    repoURL: 'https://github.com/maxim-mityutko/home-infra.git'
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
