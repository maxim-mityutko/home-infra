apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: x-extras-shared
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  destination:
    name: in-cluster
    namespace: extras
  source:
    path: kubernetes/cluster/extras/x-extras-shared
    repoURL: 'https://github.com/maxim-mityutko/home-infra.git'
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
