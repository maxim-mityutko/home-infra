apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: x-backup-shared
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  destination:
    name: ''
    namespace: backup
    server: 'https://kubernetes.default.svc'
  source:
    path: kubernetes/cluster/backup/x-backup-shared
    repoURL: 'https://github.com/maxim-mityutko/home-infra.git'
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true