apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karakeep
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "60"
spec:
  destination:
    name: in-cluster
    namespace: privacy
  source:
    path: kubernetes/cluster/privacy/karakeep
    repoURL: 'https://github.com/maxim-mityutko/home-infra.git'
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
