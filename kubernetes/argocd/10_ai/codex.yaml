apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: codex
  namespace: argocd
spec:
  destination:
    name: ''
    namespace: ai
    server: 'https://kubernetes.default.svc'
  source:
    path: kubernetes/cluster/ai/codex
    repoURL: 'https://github.com/maxim-mityutko/home-infra.git'
    targetRevision: feature/codex-app-server
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true