apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics-mcp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "18"
spec:
  destination:
    name: in-cluster
    namespace: ai
  source:
    path: kubernetes/cluster/ai/victoria-metrics-mcp
    repoURL: 'https://github.com/maxim-mityutko/home-infra.git'
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
