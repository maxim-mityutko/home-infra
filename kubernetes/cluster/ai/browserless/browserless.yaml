---
apiVersion: v1
kind: Service
metadata:
  name: browserless
  namespace: ai
  labels:
    app.kubernetes.io/name: browserless
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: browserless
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: browserless
  namespace: ai
  labels:
    app.kubernetes.io/name: browserless
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: browserless
  strategy:
    type: Recreate
  revisionHistoryLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: browserless
    spec:
      automountServiceAccountToken: false
      containers:
        - name: browserless
          image: ghcr.io/browserless/chromium:v2.48.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: browserless
            - secretRef:
                name: browserless
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: 1000m
          livenessProbe:
            httpGet:
              path: /pressure
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /pressure
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: dshm
              mountPath: /dev/shm
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: browserless
  namespace: ai
  labels:
    app.kubernetes.io/name: browserless
data:
  HOST: 0.0.0.0
  PORT: "3000"
  CONCURRENT: "2"
  QUEUED: "10"
  TIMEOUT: "3000"
  LOG_LEVEL: info
