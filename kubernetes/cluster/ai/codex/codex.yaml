---
apiVersion: v1
kind: Service
metadata:
  name: codex
  namespace: ai
  labels:
    app.kubernetes.io/name: codex
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: codex
  ports:
    - name: app-server
      port: 4500
      targetPort: 4500
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codex
  namespace: ai
  labels:
    app.kubernetes.io/name: codex
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: codex
  strategy:
    type: Recreate
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codex
    spec:
      serviceAccountName: codex
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: codex
          image: ghcr.io/openai/codex-universal:latest
          command:
            - codex
            - app-server
            - --listen
            - ws://0.0.0.0:4500
            - --ws-auth
            - capability-token
            - --ws-token-file
            - /secrets/CODEX_ACCESS_TOKEN
          env:
            - name: CODEX_HOME
              value: /home/codex/.codex
            - name: CODEX_FS_WORKSPACE_ROOT
              value: /workspace
          resources:
            requests:
              memory: 2Gi
              cpu: 500m
            limits:
              memory: 8Gi
              cpu: 2000m
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4500
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4500
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: codex-workspace
              mountPath: /workspace
            - name: codex-home
              mountPath: /home/codex/.codex
            - name: codex-access
              mountPath: /secrets
              readOnly: true
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: codex-workspace
          persistentVolumeClaim:
            claimName: codex-workspace
        - name: codex-home
          persistentVolumeClaim:
            claimName: codex-home
        - name: codex-access
          secret:
            secretName: codex-access
        - name: kube-api-access
          projected:
            defaultMode: 0444
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace