---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: codex
  namespace: ai
  labels:
    app.kubernetes.io/name: codex
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: codex
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openclaw
      ports:
        - protocol: TCP
          port: 4500
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openclaw
      ports:
        - protocol: TCP
          port: 4500
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80