---
# NOTE: Replace placeholder with real sealed secret content via kubeseal.
# Generate a token with: openssl rand -base64 32
# Then: kubectl create secret generic codex-access -n ai --from-literal=CODEX_ACCESS_TOKEN=<token> --dry-run=client -o yaml | kubeseal -o yaml
apiVersion: v1
kind: Secret
metadata:
  name: codex-access
  namespace: ai
  labels:
    app.kubernetes.io/name: codex
type: Opaque
stringData:
  CODEX_ACCESS_TOKEN: "REPLACE_WITH_REAL_TOKEN"