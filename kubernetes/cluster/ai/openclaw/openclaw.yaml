---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: ai
  labels:
    app.kubernetes.io/name: openclaw
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: openclaw
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: ai
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  strategy:
    type: Recreate
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
    spec:
      serviceAccountName: openclaw
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: busybox:1.38
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              sed \
                -e "s|\${DISCORD_SERVER_ID}|${DISCORD_SERVER_ID}|g" \
                /config/openclaw.json > "${OPENCLAW_CONFIG_DIR}/openclaw.json"
              echo "Rendered ${OPENCLAW_CONFIG_DIR}/openclaw.json"

              mkdir -p "${HOME}/.config/rbw"
              sed \
                -e "s|\${BITWARDEN_USER_EMAIL}|${BITWARDEN_USER_EMAIL}|g" \
                -e "s|\${BITWARDEN_BASE_URL}|${BITWARDEN_BASE_URL}|g" \
                /config/rbw.json > "${HOME}/.config/rbw/config.json"
              chmod a=r "${HOME}/.config/rbw/config.json"
              echo "Rendered ${HOME}/.config/rbw/config.json"
          envFrom:
            - configMapRef:
                name: openclaw
            - secretRef:
                name: openclaw
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node
            - name: openclaw-data
              mountPath: /home/node/.openclaw
              
            - name: openclaw-config
              mountPath: /config/openclaw.json
              subPath: openclaw.json
            - name: rbw-config-template
              mountPath: /config/rbw.json
              subPath: rbw.json
      containers:
        - name: gateway
          # Using custom image with baked in dependencies
          image: ghcr.io/maxim-mityutko/openclaw-docker@sha256:592bbeb1210dd6a89eeac56d2fce63a5cad4456e49437c714b65f365278cb4f9
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          envFrom:
            - configMapRef:
                name: openclaw
            - secretRef:
                name: openclaw
          resources:
            requests:
              memory: 1Gi
              cpu: 150m
            limits:
              memory: 4Gi
              cpu: 1000m
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: openclaw-temp
              mountPath: /tmp
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      nodeSelector:
        beta.kubernetes.io/arch: amd64
      volumes:
        - name: openclaw-home
          emptyDir: {}
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: openclaw-config
          configMap:
            name: openclaw-config
        - name: openclaw-temp
          emptyDir: {}
        - name: rbw-config-template
          configMap:
            name: rbw-config
        - name: kube-api-access
          projected:
            defaultMode: 0444
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw
  namespace: ai
  labels:
    app.kubernetes.io/name: openclaw
data:
  HOME: /home/node
  OPENCLAW_CONFIG_DIR: /home/node/.openclaw
  NODE_ENV: production
