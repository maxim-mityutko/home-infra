---
apiVersion: v1
kind: ConfigMap
metadata:
  name: victoria-logs-mcp-cold-start-placeholder
  namespace: ai
  labels:
    http.keda.sh/response-body: "true"
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Victoria Logs MCP is starting</title>
        <style>
          :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #172033; --page-start: #f8fbff; --page-end: #eef3f8; --panel: #fff; --edge: #d8e0ea; --muted: #5d697c; --accent: #2f855a; --accent-soft: #d6f5e4; --shadow: rgba(23, 32, 51, 0.14); }
          * { box-sizing: border-box; }
          body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 35%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 32rem), linear-gradient(180deg, var(--page-start) 0%, var(--page-end) 100%); }
          main { display: grid; justify-items: center; gap: 1.15rem; padding: 1.5rem; text-align: center; inline-size: min(100%, 28rem); }
          .scene { position: relative; width: 9rem; height: 8rem; display: grid; place-items: center; }
          h1 { margin: 0; font-size: 1.35rem; line-height: 1.2; font-weight: 800; letter-spacing: 0; }
          p { margin: 0; color: var(--muted); font-size: 0.98rem; line-height: 1.5; }
          @media (prefers-color-scheme: dark) { :root { color-scheme: dark; background: #101820; color: #eef6f2; --page-start: #14211d; --page-end: #0b1116; --panel: #14261f; --edge: #294138; --muted: #a3b5ad; --accent: #5ee0a0; --accent-soft: #234d3a; --shadow: rgba(0, 0, 0, 0.34); } }
          @media (prefers-reduced-motion: reduce) { .scene * { animation: none !important; } }
          .terminal { width: 7rem; height: 5.6rem; border: 1px solid var(--edge); border-radius: 0.75rem; background: var(--panel); box-shadow: 0 1.25rem 2.5rem var(--shadow); padding: 1.1rem 0.8rem 0.7rem; display: grid; gap: 0.48rem; }
          .terminal::before { content: ""; position: absolute; width: 0.42rem; height: 0.42rem; border-radius: 50%; background: var(--accent); transform: translate(0.8rem, -0.65rem); box-shadow: 0.7rem 0 0 var(--accent-soft), 1.4rem 0 0 var(--accent-soft); }
          .line { height: 0.45rem; border-radius: 999px; background: var(--accent-soft); animation: log-line 1.8s ease-in-out infinite; }
          .line:nth-child(2) { width: 72%; animation-delay: 0.2s; } .line:nth-child(3) { width: 88%; animation-delay: 0.4s; } .line:nth-child(4) { width: 58%; animation-delay: 0.6s; }
          @keyframes log-line { 50% { background: var(--accent); transform: translateX(0.25rem); } }
        </style>
      </head>
      <body>
        <main aria-live="polite">
          <div class="scene" aria-hidden="true">
            <div class="terminal"><span class="line"></span><span class="line"></span><span class="line"></span><span class="line"></span></div>
          </div>
          <h1>Victoria Logs MCP is warming up</h1>
          <p>The service is being started; it may take a few minutes. This page will refresh automatically.</p>
        </main>
      </body>
    </html>
