---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  kustomize.buildOptions: --enable-helm
  # Optional: increase these if periodic Git polling/reconciliation is too noisy.
  # This reduces background reconcile frequency, but Git changes may take longer
  # to appear unless webhooks or manual refreshes trigger Argo CD sooner.
  # timeout.reconciliation: 15m
  # timeout.reconciliation.jitter: 5m
  
  # Authentik Auth
  admin.enabled: "true" # keep the possibility of normal auth
  url: https://argocd.brhd.io
  dex.config: |
      connectors:
        - type: oidc
          id: authentik
          name: Authentik
          config:
            issuer: http://auth.brhd.io/application/o/argocd/
            clientID: $argocd-authentik:client_id
            clientSecret: $argocd-authentik:client_secret
            insecureEnableGroups: true
            scopes:
              - openid
              - profile
              - email
