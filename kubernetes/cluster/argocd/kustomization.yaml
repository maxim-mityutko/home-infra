apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.0/manifests/install.yaml
  - ingress.yaml
  - namespace.yaml
  - repo.yaml
  - secret.yaml
  - dns-endpoint.yaml
  - service-scrape.yaml
  - rule.yaml
patches:
  - target:
      kind: ConfigMap
      name: argocd-cm
    path: config-argocd-cm.yaml
  - target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
    path: config-argocd-cmd-params-cm.yaml
  - target:
      kind: ConfigMap
      name: argocd-rbac-cm
    path: config-argocd-rbac-cm.yaml
