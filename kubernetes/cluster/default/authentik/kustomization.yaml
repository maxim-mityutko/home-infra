apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - secret.yaml
  - ingress.yaml
helmCharts:
    - name: authentik
      namespace: default
      releaseName: authentik
      version: 2026.5.3
      repo: https://charts.goauthentik.io
      valuesInline:
        authentik:
          error_reporting:
            enabled: false
            send_pii: false
          log_level: warning
          postgresql:
            host: cnpg-ha-rw-pooler.default.svc.cluster.local.
        blueprints:
          configMaps: []
        global:
          revisionHistoryLimit: 1
          deploymentStrategy: 
            type: RollingUpdate
          env:
            - name: AUTHENTIK_POSTGRESQL__CONN_HEALTH_CHECKS
              value: "true"
            - name: AUTHENTIK_POSTGRESQL__DISABLE_SERVER_SIDE_CURSORS
              value: "true"
          envFrom:
            - secretRef:
                name: authentik-postgres
        server:
          replicas: 1
          metrics:
            enabled: false
          ingress:
            enabled: true
            annotations:
              kubernetes.io/ingress.class: public
              cert-manager.io/cluster-issuer: lets-encrypt
            hosts:
              - auth.brhd.io
        worker:
          replicas: 1
        prometheus:
          rules:
            enabled: false
            labels: {}
            annotations: {}
