---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: blocky-omada-sync
  namespace: default
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: omada-sync
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blocky-omada-sync
  namespace: default
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: omada-sync
data:
  OMADA_BASE_URL: https://omada.brhd.io
  BLOCKY_STATEFULSET: blocky
  CUSTOM_DNS_CONFIGMAP: blocky-omada-customdns
  CLIENT_LOOKUP_CONFIGMAP: blocky-omada-clientlookup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: blocky-omada-sync
  namespace: default
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: omada-sync
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: blocky-omada-sync
  namespace: default
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: omada-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: blocky-omada-sync
subjects:
  - kind: ServiceAccount
    name: blocky-omada-sync
    namespace: default
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: blocky-omada-dns-sync
  namespace: default
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: omada-dns-sync
spec:
  schedule: "17 3 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: blocky
            app.kubernetes.io/component: omada-dns-sync
        spec:
          serviceAccountName: blocky-omada-sync
          restartPolicy: Never
          containers:
            - name: sync-dns
              image: bitnami/kubectl:latest
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: blocky-omada-sync
                - configMapRef:
                    name: blocky-omada-sync
              command:
                - /bin/sh
                - -e
                - /scripts/omada-dns-sync.sh
              volumeMounts:
                - name: omada-sync-scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: omada-sync-scripts
              configMap:
                name: blocky-omada-sync-scripts
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: blocky-omada-clients-sync
  namespace: default
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: omada-clients-sync
spec:
  schedule: "*/15 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: blocky
            app.kubernetes.io/component: omada-clients-sync
        spec:
          serviceAccountName: blocky-omada-sync
          restartPolicy: Never
          containers:
            - name: sync-clients
              image: bitnami/kubectl:latest
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: blocky-omada-sync
                - configMapRef:
                    name: blocky-omada-sync
              command:
                - /bin/sh
                - -e
                - /scripts/omada-clients-sync.sh
              volumeMounts:
                - name: omada-sync-scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: omada-sync-scripts
              configMap:
                name: blocky-omada-sync-scripts
