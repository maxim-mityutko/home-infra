---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: blocky-omada-sync
  namespace: default
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: omada-sync
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blocky-omada-sync
  namespace: default
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: omada-sync
data:
  OMADA_BASE_URL: https://use1-omada-northbound.tplinkcloud.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: blocky-omada-sync
  namespace: default
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: omada-sync
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: blocky-omada-sync
  namespace: default
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: omada-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: blocky-omada-sync
subjects:
  - kind: ServiceAccount
    name: blocky-omada-sync
    namespace: default
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: blocky-omada-dns-sync
  namespace: default
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: omada-dns-sync
spec:
  schedule: "17 3 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: blocky
            app.kubernetes.io/component: omada-dns-sync
        spec:
          serviceAccountName: blocky-omada-sync
          restartPolicy: Never
          containers:
            - name: sync-dns
              image: bitnami/kubectl@sha256:08afc880eea24f36572644ccae85fb3e573a6ff1b7161135a3ae9a5eab222df2
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: blocky-omada-sync
                - configMapRef:
                    name: blocky-omada-sync
              command:
                - /bin/sh
                - -ec
                - |
                  dns_origin="internal.brhd.io."
                  dns_ttl="3600"
                  custom_dns_configmap="blocky-omada-customdns"
                  blocky_statefulset="blocky"

                  workdir="$(mktemp -d)"
                  trap 'rm -rf "$workdir"' EXIT

                  token_json="$(
                    jq -nc \
                      --arg omadacId "$OMADA_ID" \
                      --arg clientId "$OMADA_CLIENT_ID" \
                      --arg clientSecret "$OMADA_CLIENT_SECRET" \
                      '{omadacId: $omadacId, client_id: $clientId, client_secret: $clientSecret}' |
                    curl -fsS -X POST "$OMADA_BASE_URL/openapi/authorize/token?grant_type=client_credentials" \
                      -H "Content-Type: application/json" \
                      -d @-
                  )"
                  access_token="$(printf '%s' "$token_json" | jq -er '.result.accessToken')"

                  dns_json="$(
                    curl -fsS \
                      "$OMADA_BASE_URL/openapi/v1/$OMADA_ID/sites/$OMADA_SITE_ID/setting/lan/dns?page=1&pageSize=1000" \
                      -H "Authorization: AccessToken=$access_token"
                  )"

                  records="$(
                    printf '%s' "$dns_json" |
                    jq -r --arg lan "$OMADA_LAN_NETWORK_ID" '
                      def fqdn: if endswith(".") then . else . + "." end;
                      def record_ttl: if .customTtl == true and ((.ttl? // 0) >= 1) then .ttl else 3600 end;

                      .result.data
                      | map(select(
                          .enable == true
                          and .type == 0
                          and ((.lanNetworkIds // []) | index($lan))
                          and (((.ipAddresses // []) | length) > 0)
                        ))
                      | sort_by(.domain)
                      | .[]
                      | (.domain | fqdn) as $domain
                      | (record_ttl | tostring) as $ttl
                      | (
                          (.ipAddresses // [] | sort[] | "\($domain) \($ttl) IN A \(.)"),
                          (.aliases // [] | sort[] | (. | fqdn) as $alias | "\($alias) \($ttl) IN CNAME \($domain)")
                        )
                    '
                  )"

                  {
                    printf 'customDNS:\n'
                    printf '  filterUnmappedTypes: true\n'
                    printf '  zone: |\n'
                    printf '    $ORIGIN %s\n' "$dns_origin"
                    printf '    $TTL %s\n' "$dns_ttl"
                    printf '\n'
                    if [ -n "$records" ]; then
                      printf '%s\n' "$records" | sed 's/^/    /'
                    fi
                  } > "$workdir/omada-custom-dns.yml"

                  new_hash="$(sha256sum "$workdir/omada-custom-dns.yml" | awk '{print $1}')"
                  old_hash="$(
                    kubectl get configmap "$custom_dns_configmap" \
                      -o json 2>/dev/null |
                      jq -r '.metadata.annotations["omada/hash"] // ""' || true
                  )"

                  if [ "$new_hash" = "$old_hash" ]; then
                    echo "Omada custom DNS config is unchanged ($new_hash)"
                    exit 0
                  fi

                  kubectl create configmap "$custom_dns_configmap" \
                    --from-file=omada-custom-dns.yml="$workdir/omada-custom-dns.yml" \
                    --dry-run=client -o yaml |
                    kubectl label --local -f - \
                      app.kubernetes.io/name=blocky \
                      app.kubernetes.io/component=omada-dns-sync \
                      -o yaml |
                    kubectl annotate --local -f - \
                      omada/hash="$new_hash" \
                      -o yaml |
                    kubectl apply -f -

                  kubectl patch statefulset "$blocky_statefulset" \
                    --type merge \
                    -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"omada/dns-hash\":\"$new_hash\"}}}}}"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: blocky-omada-clients-sync
  namespace: default
  labels:
    app.kubernetes.io/name: blocky
    app.kubernetes.io/component: omada-clients-sync
spec:
  schedule: "*/15 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: blocky
            app.kubernetes.io/component: omada-clients-sync
        spec:
          serviceAccountName: blocky-omada-sync
          restartPolicy: Never
          containers:
            - name: sync-clients
              image: bitnami/kubectl@sha256:08afc880eea24f36572644ccae85fb3e573a6ff1b7161135a3ae9a5eab222df2
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: blocky-omada-sync
                - configMapRef:
                    name: blocky-omada-sync
              command:
                - /bin/sh
                - -ec
                - |
                  client_lookup_configmap="blocky-omada-clientlookup"
                  blocky_statefulset="blocky"

                  workdir="$(mktemp -d)"
                  trap 'rm -rf "$workdir"' EXIT

                  token_json="$(
                    jq -nc \
                      --arg omadacId "$OMADA_ID" \
                      --arg clientId "$OMADA_CLIENT_ID" \
                      --arg clientSecret "$OMADA_CLIENT_SECRET" \
                      '{omadacId: $omadacId, client_id: $clientId, client_secret: $clientSecret}' |
                    curl -fsS -X POST "$OMADA_BASE_URL/openapi/authorize/token?grant_type=client_credentials" \
                      -H "Content-Type: application/json" \
                      -d @-
                  )"
                  access_token="$(printf '%s' "$token_json" | jq -er '.result.accessToken')"

                  page=1
                  page_size=1000
                  : > "$workdir/clients.jsonl"

                  while :; do
                    client_json="$(
                      jq -nc \
                        --argjson page "$page" \
                        --argjson pageSize "$page_size" \
                        '{page: $page, pageSize: $pageSize, scope: 0, filters: {ipExist: true}}' |
                      curl -fsS -X POST \
                        "$OMADA_BASE_URL/openapi/v2/$OMADA_ID/sites/$OMADA_SITE_ID/clients" \
                        -H "Authorization: AccessToken=$access_token" \
                        -H "Content-Type: application/json" \
                        -d @-
                    )"

                    printf '%s' "$client_json" | jq -c '.result.data[]?' >> "$workdir/clients.jsonl"
                    current_size="$(printf '%s' "$client_json" | jq -r '.result.currentSize // (.result.data // [] | length)')"
                    total_rows="$(printf '%s' "$client_json" | jq -r '.result.totalRows // 0')"

                    if [ "$current_size" -eq 0 ] || [ "$((page * page_size))" -ge "$total_rows" ]; then
                      break
                    fi

                    page="$((page + 1))"
                  done

                  clients="$(
                    jq -s -r '
                      def trim: gsub("^\\s+|\\s+$"; "");

                      map({
                        name: ((.name // .hostName // .mac // "") | tostring | trim),
                        ips: ([.ip?] | map(select(type == "string" and length > 0)) | unique)
                      })
                      | map(select(.name != "" and (.ips | length > 0)))
                      | sort_by(.name | ascii_downcase)
                      | group_by(.name)
                      | sort_by(.[0].name | ascii_downcase)
                      | map({
                        name: .[0].name,
                        ips: (map(.ips[]) | unique | sort)
                      })
                      | map(
                        "    " + (.name | @json) + ":\n" +
                        (.ips | map("      - " + .) | join("\n"))
                      )
                      | join("\n")
                    ' "$workdir/clients.jsonl"
                  )"

                  {
                    printf 'clientLookup:\n'
                    if [ -n "$clients" ]; then
                      printf '  clients:\n'
                      printf '%s\n' "$clients"
                    else
                      printf '  clients: {}\n'
                    fi
                  } > "$workdir/omada-client-lookup.yml"

                  new_hash="$(sha256sum "$workdir/omada-client-lookup.yml" | awk '{print $1}')"
                  old_hash="$(
                    kubectl get configmap "$client_lookup_configmap" \
                      -o json 2>/dev/null |
                      jq -r '.metadata.annotations["omada/hash"] // ""' || true
                  )"

                  if [ "$new_hash" = "$old_hash" ]; then
                    echo "Omada client lookup config is unchanged ($new_hash)"
                    exit 0
                  fi

                  kubectl create configmap "$client_lookup_configmap" \
                    --from-file=omada-client-lookup.yml="$workdir/omada-client-lookup.yml" \
                    --dry-run=client -o yaml |
                    kubectl label --local -f - \
                      app.kubernetes.io/name=blocky \
                      app.kubernetes.io/component=omada-clients-sync \
                      -o yaml |
                    kubectl annotate --local -f - \
                      omada/hash="$new_hash" \
                      -o yaml |
                    kubectl apply -f -

                  kubectl patch statefulset "$blocky_statefulset" \
                    --type merge \
                    -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"omada/clients-hash\":\"$new_hash\"}}}}}"
