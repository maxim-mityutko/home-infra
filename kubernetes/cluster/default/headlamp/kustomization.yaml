apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-dashboard
resources:
  - secret.yaml
  - dns-endpoint.yaml
helmCharts:
  - name: headlamp
    namespace: kube-dashboard
    releaseName: headlamp
    version: 0.43.0
    repo: https://kubernetes-sigs.github.io/headlamp/
    valuesInline:
      replicaCount: 2
      config:
        inCluster: true
        unsafeUseServiceAccountToken: true
        inClusterContextName: "main"
        oidc:
          secret:
            create: false
          # Note: Enable if / when OIDC authentication is required, currently bypassing auth
          # externalSecret: { enabled: true, name: headlamp}
        pluginsDir: "/headlamp/plugins"
        enableHelm: false
        watchPlugins: false
        sessionTTL: 86400
      env:
        - name: HEADLAMP_CONFIG_OIDC_USE_ACCESS_TOKEN
          value: "true"
      hostUsers: true
      serviceAccount:
        create: true
      clusterRoleBinding:
        create: true
      securityContext:
        runAsNonRoot: true
        privileged: false
        runAsUser: 100
        runAsGroup: 101
      ingress:
        enabled: true
        annotations:
          kubernetes.io/ingress.class: public
          cert-manager.io/cluster-issuer: lets-encrypt
          nginx.ingress.kubernetes.io/server-snippet: |-
            large_client_header_buffers 4 64k;
            proxy_set_header X-Forwarded-Proto $scheme;
          # Note: Authentik gates browser access while Headlamp uses its service account for Kubernetes API access.
          nginx.ingress.kubernetes.io/auth-response-headers: >-
            Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid
          nginx.ingress.kubernetes.io/auth-signin: >-
            https://hl.brhd.io/outpost.goauthentik.io/start?rd=$escaped_request_uri
          nginx.ingress.kubernetes.io/auth-snippet: |
            proxy_set_header X-Forwarded-Host $http_host;
          nginx.ingress.kubernetes.io/auth-url: >-
            http://authentik-outpost-embedded.default.svc.cluster.local:9000/outpost.goauthentik.io/auth/nginx

        hosts:
          - host: hl.brhd.io
            paths:
              - path: /
                type: ImplementationSpecific
      # Refer to https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.HTTPRoute
      httpRoute:
        enabled: false
      resources:
        requests:
          cpu: 50m
          memory: 50Mi
        limits:
          memory: 150Mi
      pluginsManager:
        enabled: false
      podDisruptionBudget:
        enabled: false
      nodeSelector:
        node.kubernetes.io/microk8s-controlplane: microk8s-controlplane
      tolerations:
        - key: "node.kubernetes.io/unschedulable"
          operator: Exists
