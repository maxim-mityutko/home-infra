---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: forge-pool
  namespace: metallb-system
spec:
  autoAssign: false
  addresses:
    - 192.168.12.70-192.168.12.99
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: forge-pool
  namespace: metallb-system
spec:
  ipAddressPools:
    - forge-pool
