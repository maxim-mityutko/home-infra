---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bento-pdf-cold-start-placeholder
  namespace: extras
  labels:
    http.keda.sh/response-body: "true"
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Service is starting</title>
        <style>
          :root {
            color-scheme: light dark;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8fafc;
            color: #111827;
          }

          * {
            box-sizing: border-box;
          }

          body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #f8fafc;
          }

          main {
            display: grid;
            justify-items: center;
            gap: 1rem;
            padding: 1.5rem;
            text-align: center;
          }

          .loader {
            width: 3rem;
            height: 3rem;
            border: 0.35rem solid #d1d5db;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
          }

          p {
            margin: 0;
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 500;
          }

          @keyframes spin {
            to {
              transform: rotate(360deg);
            }
          }

          @media (prefers-reduced-motion: reduce) {
            .loader {
              animation: none;
            }
          }
        </style>
      </head>
      <body>
        <main aria-live="polite">
          <div class="loader" aria-hidden="true"></div>
          <p>The service is starting up, please wait&hellip;</p>
        </main>
      </body>
    </html>
