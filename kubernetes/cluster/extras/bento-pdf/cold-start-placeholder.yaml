---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bento-pdf-cold-start-placeholder
  namespace: extras
  labels:
    http.keda.sh/response-body: "true"
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>BentoPDF is starting</title>
        <style>
          :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #172033; --page-start: #f8fbff; --page-end: #eef3f8; --paper: #fff; --paper-edge: #d8e0ea; --muted: #5d697c; --blue: #2978b5; --shadow: rgba(23, 32, 51, 0.14); }
          * { box-sizing: border-box; }
          body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 35%, color-mix(in srgb, var(--blue) 14%, transparent), transparent 32rem), linear-gradient(180deg, var(--page-start) 0%, var(--page-end) 100%); }
          main { display: grid; justify-items: center; gap: 1.15rem; padding: 1.5rem; text-align: center; inline-size: min(100%, 26rem); }
          .press { position: relative; width: 9rem; height: 8rem; display: grid; place-items: center; }
          .page { position: absolute; width: 5.4rem; height: 7rem; border: 1px solid var(--paper-edge); border-radius: 0.55rem 0.55rem 0.45rem 0.45rem; background: var(--paper); box-shadow: 0 1.25rem 2.5rem var(--shadow); transform-origin: 50% 100%; }
          .page::before { content: ""; position: absolute; inset: 0.85rem 0.75rem auto; height: 0.45rem; border-radius: 999px; background: var(--blue); box-shadow: 0 1.05rem 0 -0.08rem var(--paper-edge), 0 2.1rem 0 -0.08rem var(--paper-edge), 0 3.15rem 0 -0.08rem var(--paper-edge); }
          .page::after { content: ""; position: absolute; right: -1px; bottom: -1px; width: 2rem; height: 2rem; border-radius: 0.45rem 0 0.45rem 0; background: linear-gradient(135deg, transparent 49%, var(--paper-edge) 50%, #eef3f8 51%); }
          .page:nth-child(1) { animation: page-one 2.4s ease-in-out infinite; }
          .page:nth-child(2) { animation: page-two 2.4s ease-in-out infinite; }
          .page:nth-child(3) { animation: page-three 2.4s ease-in-out infinite; }
          h1 { margin: 0; font-size: 1.35rem; line-height: 1.2; font-weight: 800; letter-spacing: 0; }
          p { margin: 0; color: var(--muted); font-size: 0.98rem; line-height: 1.5; }
          @media (prefers-color-scheme: dark) { :root { color-scheme: dark; background: #101820; color: #eef6ff; --page-start: #142034; --page-end: #090f18; --paper: #152234; --paper-edge: #2b405a; --muted: #a8b6c6; --blue: #6bb6f0; --shadow: rgba(0, 0, 0, 0.34); } .page::after { background: linear-gradient(135deg, transparent 49%, var(--paper-edge) 50%, var(--page-end) 51%); } }
          @keyframes page-one { 0%, 100% { transform: translateX(-1.3rem) rotate(-10deg); } 45%, 65% { transform: translateX(-0.55rem) translateY(-0.2rem) rotate(-4deg); } }
          @keyframes page-two { 0%, 100% { transform: translateX(0.2rem) rotate(1deg); } 45%, 65% { transform: translateX(0) translateY(-0.45rem) rotate(0deg); } }
          @keyframes page-three { 0%, 100% { transform: translateX(1.35rem) rotate(10deg); } 45%, 65% { transform: translateX(0.55rem) translateY(-0.2rem) rotate(4deg); } }
          @media (prefers-reduced-motion: reduce) { .page { animation: none; } }
        </style>
      </head>
      <body>
        <main aria-live="polite">
          <div class="press" aria-hidden="true">
            <div class="page"></div>
            <div class="page"></div>
            <div class="page"></div>
          </div>
          <h1>BentoPDF is warming up</h1>
          <p>The service is being started; it may take a few minutes. This page will refresh automatically.</p>
        </main>
      </body>
    </html>
