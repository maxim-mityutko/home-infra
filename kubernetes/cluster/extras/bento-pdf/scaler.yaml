---
kind: HTTPScaledObject
apiVersion: http.keda.sh/v1alpha1
metadata:
  name: bento-pdf-scaler
spec:
  hosts:
    - pdf.brhd.io
  scaleTargetRef:
    name: bento-pdf
    kind: Deployment
    apiVersion: apps/v1
    service: bento-pdf
    port: 8080
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 1800 # 30 minutes
  scalingMetric:
    concurrency:
      targetValue: 1
