---
apiVersion: v1
kind: Service
metadata:
  name: cloud-beaver-keda-http-interceptor
  namespace: extras
spec:
  type: ExternalName
  externalName: keda-add-ons-http-interceptor-proxy.keda.svc.cluster.local.
  ports:
    - name: http
      port: 8978
---
kind: HTTPScaledObject
apiVersion: http.keda.sh/v1alpha1
metadata:
  name: cloud-beaver-scaler
spec:
  hosts:
    - cb.brhd.io
  scaleTargetRef:
    name: cloud-beaver
    kind: Deployment
    apiVersion: apps/v1
    service: cloud-beaver
    port: 8978
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 1800 # 30 minutes
  scalingMetric:
    concurrency:
      targetValue: 1
