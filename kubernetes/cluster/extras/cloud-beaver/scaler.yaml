---
kind: HTTPScaledObject
apiVersion: http.keda.sh/v1alpha1
metadata:
  name: cloud-beaver-scaler
spec:
  hosts:
    - cb.brhd.io
  scaleTargetRef:
    name: cloud-beaver
    kind: Deployment
    apiVersion: apps/v1
    service: cloud-beaver
    port: 8978
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 1800 # 30 minutes
  scalingMetric:
    concurrency:
      targetValue: 1
