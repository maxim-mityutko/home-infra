---
apiVersion: http.keda.sh/v1beta1
kind: InterceptorRoute
metadata:
  name: cloud-beaver-scaler
spec:
  target:
    service: cloud-beaver
    port: 8978
  rules:
    - hosts:
        - cb.brhd.io
  scalingMetric:
    concurrency:
      targetValue: 50
  # timeouts:
  #   readiness: 30s
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: cloud-beaver-scaler
spec:
  scaleTargetRef:
    name: cloud-beaver
  minReplicaCount: 0
  maxReplicaCount: 1
  pollingInterval: 60
  initialCooldownPeriod: 600
  cooldownPeriod: 1800
  triggers:
    - type: external-push
      metadata:
        scalerAddress: keda-add-ons-http-external-scaler.keda:9090
        interceptorRoute: cloud-beaver-scaler
