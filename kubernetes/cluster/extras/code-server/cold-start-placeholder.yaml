---
apiVersion: v1
kind: ConfigMap
metadata:
  name: code-server-cold-start-placeholder
  namespace: extras
  labels:
    http.keda.sh/response-body: "true"
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Code Server is starting</title>
        <style>
          :root { color-scheme: light dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #172033; --panel: #fff; --edge: #d8e0ea; --muted: #5d697c; --accent: #007acc; --accent-soft: #d7ecff; }
          * { box-sizing: border-box; }
          body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 35%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 32rem), linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%); }
          main { display: grid; justify-items: center; gap: 1.15rem; padding: 1.5rem; text-align: center; inline-size: min(100%, 28rem); }
          .scene { position: relative; width: 9rem; height: 8rem; display: grid; place-items: center; }
          h1 { margin: 0; font-size: 1.35rem; line-height: 1.2; font-weight: 800; letter-spacing: 0; }
          p { margin: 0; color: var(--muted); font-size: 0.98rem; line-height: 1.5; }
          @media (prefers-reduced-motion: reduce) { .scene * { animation: none !important; } }
          .editor { width: 7.2rem; height: 5.5rem; border: 1px solid var(--edge); border-radius: 0.75rem; background: var(--panel); box-shadow: 0 1.25rem 2.5rem rgba(23, 32, 51, 0.14); padding: 1rem; display: grid; align-content: center; gap: 0.55rem; }
          .code-line { height: 0.45rem; border-radius: 999px; background: var(--accent-soft); } .code-line:nth-child(1) { width: 74%; } .code-line:nth-child(2) { width: 55%; } .code-line:nth-child(3) { width: 82%; }
          .cursor { width: 0.38rem; height: 1.2rem; border-radius: 999px; background: var(--accent); animation: blink 1s steps(2, jump-none) infinite; }
          @keyframes blink { 50% { opacity: 0; } }
        </style>
      </head>
      <body>
        <main aria-live="polite">
          <div class="scene" aria-hidden="true">
            <div class="editor"><span class="code-line"></span><span class="code-line"></span><span class="code-line"></span><span class="cursor"></span></div>
          </div>
          <h1>Code Server is warming up</h1>
          <p>The service is being started; it may take a few minutes. This page will refresh automatically.</p>
        </main>
      </body>
    </html>
