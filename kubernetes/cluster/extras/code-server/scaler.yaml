---
kind: HTTPScaledObject
apiVersion: http.keda.sh/v1alpha1
metadata:
  name: code-server-scaler
spec:
  hosts:
    - vs.brhd.io
  scaleTargetRef:
    name: code-server
    kind: Deployment
    apiVersion: apps/v1
    service: code-server
    port: 8080
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 1800 # 30 minutes
  scalingMetric:
    concurrency:
      targetValue: 1
