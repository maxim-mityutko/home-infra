---
apiVersion: http.keda.sh/v1beta1
kind: InterceptorRoute
metadata:
  name: code-server-scaler
spec:
  target:
    service: code-server
    port: 8080
  rules:
    - hosts:
        - vs.brhd.io
  scalingMetric:
    concurrency:
      targetValue: 25
    requestRate:
      targetValue: 1
      window: 1m
  coldStart:
    placeholder:
      response:
        bodyFromConfigMap:
          name: code-server-cold-start-placeholder
          key: index.html
        headers:
          Content-Type: text/html; charset=utf-8
          Refresh: "5"
        statusCode: 503
  # timeouts:
  #   readiness: 30s
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: code-server-scaler
spec:
  scaleTargetRef:
    name: code-server
  minReplicaCount: 0
  maxReplicaCount: 1
  pollingInterval: 60
  initialCooldownPeriod: 600
  cooldownPeriod: 1800
  triggers:
    - type: external-push
      metadata:
        scalerAddress: keda-add-ons-http-external-scaler.keda:9090
        interceptorRoute: code-server-scaler
