---
apiVersion: v1
kind: ConfigMap
metadata:
  name: it-tools-cold-start-placeholder
  namespace: extras
  labels:
    http.keda.sh/response-body: "true"
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>IT Tools is starting</title>
        <style>
          :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #172033; --page-start: #f8fbff; --page-end: #eef3f8; --panel: #fff; --edge: #d8e0ea; --muted: #5d697c; --accent: #7c3aed; --accent-soft: #ede9fe; --shadow: rgba(23, 32, 51, 0.12); }
          * { box-sizing: border-box; }
          body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 35%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 32rem), linear-gradient(180deg, var(--page-start) 0%, var(--page-end) 100%); }
          main { display: grid; justify-items: center; gap: 1.15rem; padding: 1.5rem; text-align: center; inline-size: min(100%, 28rem); }
          .scene { position: relative; width: 9rem; height: 8rem; display: grid; place-items: center; }
          h1 { margin: 0; font-size: 1.35rem; line-height: 1.2; font-weight: 800; letter-spacing: 0; }
          p { margin: 0; color: var(--muted); font-size: 0.98rem; line-height: 1.5; }
          @media (prefers-color-scheme: dark) { :root { color-scheme: dark; background: #171322; color: #f4f0ff; --page-start: #201735; --page-end: #0d0a14; --panel: #20172f; --edge: #3f3159; --muted: #b8accd; --accent: #a78bfa; --accent-soft: #3d2b63; --shadow: rgba(0, 0, 0, 0.34); } }
          @media (prefers-reduced-motion: reduce) { .scene * { animation: none !important; } }
          .tools { width: 7rem; height: 6rem; display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.65rem; }
          .tile { border: 1px solid var(--edge); border-radius: 0.7rem; background: var(--panel); box-shadow: 0 0.8rem 1.6rem var(--shadow); position: relative; animation: tile-lift 2s ease-in-out infinite; }
          .tile::before { content: ""; position: absolute; inset: 1rem; border-radius: 0.35rem; border: 0.35rem solid var(--accent); border-left-color: var(--accent-soft); }
          .tile:nth-child(2) { animation-delay: 0.15s; } .tile:nth-child(3) { animation-delay: 0.3s; } .tile:nth-child(4) { animation-delay: 0.45s; }
          @keyframes tile-lift { 50% { transform: translateY(-0.25rem); } }
        </style>
      </head>
      <body>
        <main aria-live="polite">
          <div class="scene" aria-hidden="true">
            <div class="tools"><span class="tile"></span><span class="tile"></span><span class="tile"></span><span class="tile"></span></div>
          </div>
          <h1>IT Tools is warming up</h1>
          <p>The service is being started; it may take a few minutes. This page will refresh automatically.</p>
        </main>
      </body>
    </html>
