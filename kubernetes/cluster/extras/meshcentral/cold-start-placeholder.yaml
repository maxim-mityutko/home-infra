---
apiVersion: v1
kind: ConfigMap
metadata:
  name: meshcentral-cold-start-placeholder
  namespace: extras
  labels:
    http.keda.sh/response-body: "true"
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>MeshCentral is starting</title>
        <style>
          :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #172033; --page-start: #f8fbff; --page-end: #eef3f8; --panel: #fff; --edge: #d8e0ea; --muted: #5d697c; --accent: #2563eb; --accent-soft: #dbeafe; --shadow: rgba(23, 32, 51, 0.14); --soft-shadow: rgba(23, 32, 51, 0.12); }
          * { box-sizing: border-box; }
          body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 35%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 32rem), linear-gradient(180deg, var(--page-start) 0%, var(--page-end) 100%); }
          main { display: grid; justify-items: center; gap: 1.15rem; padding: 1.5rem; text-align: center; inline-size: min(100%, 28rem); }
          .scene { position: relative; width: 9rem; height: 8rem; display: grid; place-items: center; }
          h1 { margin: 0; font-size: 1.35rem; line-height: 1.2; font-weight: 800; letter-spacing: 0; }
          p { margin: 0; color: var(--muted); font-size: 0.98rem; line-height: 1.5; }
          @media (prefers-color-scheme: dark) { :root { color-scheme: dark; background: #101722; color: #eef5ff; --page-start: #142039; --page-end: #090d17; --panel: #142033; --edge: #2b3d5e; --muted: #a7b6ca; --accent: #73a7ff; --accent-soft: #24395f; --shadow: rgba(0, 0, 0, 0.34); --soft-shadow: rgba(0, 0, 0, 0.28); } }
          @media (prefers-reduced-motion: reduce) { .scene * { animation: none !important; } }
          .kvm { width: 7.2rem; height: 6rem; position: relative; display: grid; place-items: start center; }
          .monitor { width: 6.6rem; height: 4.1rem; border: 0.35rem solid var(--accent); border-radius: 0.65rem; background: var(--panel); box-shadow: 0 1.25rem 2.5rem var(--shadow); position: relative; overflow: hidden; }
          .monitor::before { content: ""; position: absolute; inset: 0.75rem 0.9rem; border-radius: 0.35rem; background: linear-gradient(90deg, var(--accent-soft) 35%, transparent 0 48%, var(--accent-soft) 0 76%, transparent 0), linear-gradient(var(--accent-soft), var(--accent-soft)); background-size: 100% 0.45rem, 62% 0.45rem; background-position: 0 0, 0 1.05rem; background-repeat: no-repeat; }
          .monitor::after { content: ""; position: absolute; left: 1.1rem; top: 2.4rem; width: 0.55rem; height: 0.55rem; border-right: 0.2rem solid var(--accent); border-bottom: 0.2rem solid var(--accent); transform: rotate(-45deg); animation: pointer-move 2s ease-in-out infinite; }
          .stand { position: absolute; top: 4.05rem; width: 2.8rem; height: 1rem; border-radius: 0 0 0.35rem 0.35rem; border-bottom: 0.35rem solid var(--accent); border-left: 0.35rem solid transparent; border-right: 0.35rem solid transparent; }
          .keyboard { position: absolute; bottom: 0.15rem; width: 5.8rem; height: 1rem; border: 1px solid var(--edge); border-radius: 0.35rem; background: var(--panel); box-shadow: 0 0.8rem 1.6rem var(--soft-shadow); }
          .keyboard::before { content: ""; position: absolute; inset: 0.3rem 0.55rem; border-radius: 999px; background: repeating-linear-gradient(90deg, var(--accent-soft) 0 0.55rem, transparent 0.55rem 0.8rem); animation: key-tap 1.8s ease-in-out infinite; }
          @keyframes pointer-move { 50% { transform: translate(2.6rem, -0.9rem) rotate(-45deg); } }
          @keyframes key-tap { 50% { background: repeating-linear-gradient(90deg, var(--accent) 0 0.55rem, transparent 0.55rem 0.8rem); } }
        </style>
      </head>
      <body>
        <main aria-live="polite">
          <div class="scene" aria-hidden="true">
            <div class="kvm"><div class="monitor"></div><div class="stand"></div><div class="keyboard"></div></div>
          </div>
          <h1>MeshCentral is warming up</h1>
          <p>The service is being started; it may take a few minutes. This page will refresh automatically.</p>
        </main>
      </body>
    </html>
