---
kind: HTTPScaledObject
apiVersion: http.keda.sh/v1alpha1
metadata:
  name: meshcentral-scaler
spec:
  hosts:
    - mesh.brhd.io
  scaleTargetRef:
    name: meshcentral
    kind: Deployment
    apiVersion: apps/v1
    service: meshcentral
    port: 443
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 1800 # 30 minutes
  scalingMetric:
    concurrency:
      targetValue: 1
