---
apiVersion: http.keda.sh/v1beta1
kind: InterceptorRoute
metadata:
  name: meshcentral-scaler
spec:
  target:
    service: meshcentral
    port: 8443
  rules:
    - hosts:
        - mesh.brhd.io
  scalingMetric:
    concurrency:
      targetValue: 25
  # timeouts:
  #   readiness: 30s
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: meshcentral-scaler
spec:
  scaleTargetRef:
    name: meshcentral
  minReplicaCount: 0
  maxReplicaCount: 1
  pollingInterval: 60
  initialCooldownPeriod: 600
  cooldownPeriod: 1800
  triggers:
    - type: external-push
      metadata:
        scalerAddress: keda-add-ons-http-external-scaler.keda:9090
        interceptorRoute: meshcentral-scaler
