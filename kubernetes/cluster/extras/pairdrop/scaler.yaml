---
kind: HTTPScaledObject
apiVersion: http.keda.sh/v1alpha1
metadata:
  name: pairdrop-scaler
spec:
  hosts:
    - pd.brhd.io
  scaleTargetRef:
    name: pairdrop
    kind: Deployment
    apiVersion: apps/v1
    service: pairdrop
    port: 3000
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 1800 # 30 minutes
  scalingMetric:
    concurrency:
      targetValue: 1
