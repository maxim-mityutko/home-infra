---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stash-cold-start-placeholder
  namespace: media
  labels:
    http.keda.sh/response-body: "true"
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Stash is starting</title>
        <style>
          :root { color-scheme: light dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #172033; --panel: #fff; --edge: #d8e0ea; --muted: #5d697c; --accent: #d946ef; --accent-soft: #fae8ff; }
          * { box-sizing: border-box; }
          body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 35%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 32rem), linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%); }
          main { display: grid; justify-items: center; gap: 1.15rem; padding: 1.5rem; text-align: center; inline-size: min(100%, 28rem); }
          .scene { position: relative; width: 9rem; height: 8rem; display: grid; place-items: center; }
          h1 { margin: 0; font-size: 1.35rem; line-height: 1.2; font-weight: 800; letter-spacing: 0; }
          p { margin: 0; color: var(--muted); font-size: 0.98rem; line-height: 1.5; }
          @media (prefers-reduced-motion: reduce) { .scene * { animation: none !important; } }
          .media-grid { width: 7rem; height: 5.8rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
          .poster { border: 1px solid var(--edge); border-radius: 0.45rem; background: linear-gradient(160deg, var(--panel), var(--accent-soft)); box-shadow: 0 0.8rem 1.6rem rgba(23, 32, 51, 0.12); animation: poster-focus 2.2s ease-in-out infinite; }
          .poster:nth-child(2) { animation-delay: 0.15s; } .poster:nth-child(3) { animation-delay: 0.3s; } .poster:nth-child(4) { animation-delay: 0.45s; } .poster:nth-child(5) { animation-delay: 0.6s; } .poster:nth-child(6) { animation-delay: 0.75s; }
          @keyframes poster-focus { 50% { transform: scale(0.92); background: var(--accent); } }
        </style>
      </head>
      <body>
        <main aria-live="polite">
          <div class="scene" aria-hidden="true">
            <div class="media-grid"><span class="poster"></span><span class="poster"></span><span class="poster"></span><span class="poster"></span><span class="poster"></span><span class="poster"></span></div>
          </div>
          <h1>Stash is warming up</h1>
          <p>The service is being started; it may take a few minutes. This page will refresh automatically.</p>
        </main>
      </body>
    </html>
