---
kind: HTTPScaledObject
apiVersion: http.keda.sh/v1alpha1
metadata:
  name: stash-scaler
spec:
  hosts:
    - stash.brhd.io
  scaleTargetRef:
    name: stash
    kind: Deployment
    apiVersion: apps/v1
    service: stash
    port: 80
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 1800 # 30 minutes
  scalingMetric:
    concurrency:
      targetValue: 1
