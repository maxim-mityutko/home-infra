apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - dns-endpoint.yaml
helmCharts:
  - name: victoria-logs-single
    namespace: monitoring
    releaseName: vl-single
    version: 0.12.4
    repo: https://victoriametrics.github.io/helm-charts/
    valuesInline:
      server:
        retentionPeriod: 7d
        persistentVolume:
          size: 20Gi
          storageClassName: nfs-subdir
        # resources:
        #   requests:
        #     cpu: 250m
        #     memory: 512Mi
        #   limits:
        #     cpu: "1"
        #     memory: 2Gi
        ingress:
          enabled: true
          annotations:
            kubernetes.io/ingress.class: public
            cert-manager.io/cluster-issuer: lets-encrypt
            nginx.ingress.kubernetes.io/auth-response-headers: >-
              Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid
            nginx.ingress.kubernetes.io/auth-signin: >-
              https://vlogs.brhd.io/outpost.goauthentik.io/start?rd=$escaped_request_uri
            nginx.ingress.kubernetes.io/auth-snippet: |
              proxy_set_header X-Forwarded-Host $http_host;
            nginx.ingress.kubernetes.io/auth-url: >-
              http://authentik-outpost-embedded.default.svc.cluster.local.:9000/outpost.goauthentik.io/auth/nginx
          hosts:
            - name: vlogs.brhd.io
              path:
                - /
              port: http
          # tls:
          #   - hosts:
          #       - vlogs.brhd.io
  - name: victoria-logs-collector
    namespace: monitoring
    releaseName: vl-collector
    version: 0.3.3
    repo: https://victoriametrics.github.io/helm-charts/
    valuesInline:
      collector:
        # Ref: https://docs.victoriametrics.com/victorialogs/keyconcepts/#time-field
        timeField:
          - time
          - ts
          - timestamp
        # Ref: https://docs.victoriametrics.com/victorialogs/keyconcepts/#message-field
        msgField:
          - message
          - msg
          - log
        # Ref: https://docs.victoriametrics.com/victorialogs/keyconcepts/#stream-fields
        streamFields:
          - kubernetes.container_name
          - kubernetes.pod_name
          - kubernetes.pod_namespace
        # Ref: https://docs.victoriametrics.com/victorialogs/vlagent/#filtering-kubernetes-logs
        excludeFilter: >-
          kubernetes.pod_name:=%{HOSTNAME}
          or kubernetes.pod_namespace:in(ai,media)
        includePodLabels: false
        includePodAnnotations: false
        includeNodeLabels: false
        includeNodeAnnotations: false
      remoteWrite:
        - url: http://vl-single-victoria-logs-single-server.monitoring.svc.cluster.local.:9428
          maxDiskUsagePerURL: 100MB
      podMonitor:
        enabled: false
        vm: true
      securityContext:
        enabled: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
      resources:
        requests:
          cpu: 50m
          memory: 75Mi
        limits:
          cpu: 100m
          memory: 100Mi
  - name: victoria-logs-mcp
    namespace: monitoring
    releaseName: vl-mcp
    version: 0.1.0
    repo: https://victoriametrics.github.io/helm-charts/
    valuesInline:
      vl:
        entrypoint: http://vl-single-victoria-logs-single-server.monitoring.svc.cluster.local.:9428
      mcp:
        mode: http
        disable:
          tools: []
          resources: false
      service:
        type: ClusterIP
        port: 8080
      serviceAccount:
        automount: false
      securityContext:
        capabilities:
          drop:
          - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
      resources:
        requests:
          cpu: 50m
          memory: 75Mi
        limits:
          cpu: 100m
          memory: 150Mi
      ingress:
        enabled: true
        annotations:
          kubernetes.io/ingress.class: public
          cert-manager.io/cluster-issuer: lets-encrypt
          nginx.ingress.kubernetes.io/auth-response-headers: >-
            Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid
          nginx.ingress.kubernetes.io/auth-signin: >-
            https://vlogs-mcp.brhd.io/outpost.goauthentik.io/start?rd=$escaped_request_uri
          nginx.ingress.kubernetes.io/auth-snippet: |
            proxy_set_header X-Forwarded-Host $http_host;
          nginx.ingress.kubernetes.io/auth-url: >-
            http://authentik-outpost-embedded.default.svc.cluster.local.:9000/outpost.goauthentik.io/auth/nginx
        hosts:
          - host: vlogs-mcp.brhd.io
            paths:
              - path: /
                pathType: ImplementationSpecific
      route:
        enabled: false
      livenessProbe:
        httpGet:
          path: /health/liveness
          port: http
          scheme: HTTP
        initialDelaySeconds: 10
        timeoutSeconds: 5
        periodSeconds: 30
      readinessProbe:
        httpGet:
          path: /health/readiness
          port: http
          scheme: HTTP
        initialDelaySeconds: 10
        timeoutSeconds: 5
        periodSeconds: 30
      scrape:
        enabled: false