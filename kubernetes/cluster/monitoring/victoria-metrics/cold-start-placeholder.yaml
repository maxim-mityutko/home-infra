---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-cold-start-placeholder
  namespace: monitoring
  labels:
    http.keda.sh/response-body: "true"
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Grafana is starting</title>
        <style>
          :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #172033; --page-start: #f8fbff; --page-end: #eef3f8; --panel: #fff; --edge: #d8e0ea; --muted: #5d697c; --accent: #f46800; --accent-soft: #ffe1c2; --shadow: rgba(23, 32, 51, 0.14); }
          * { box-sizing: border-box; }
          body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 35%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 32rem), linear-gradient(180deg, var(--page-start) 0%, var(--page-end) 100%); }
          main { display: grid; justify-items: center; gap: 1.15rem; padding: 1.5rem; text-align: center; inline-size: min(100%, 28rem); }
          .scene { position: relative; width: 9rem; height: 8rem; display: grid; place-items: center; }
          h1 { margin: 0; font-size: 1.35rem; line-height: 1.2; font-weight: 800; letter-spacing: 0; }
          p { margin: 0; color: var(--muted); font-size: 0.98rem; line-height: 1.5; }
          @media (prefers-color-scheme: dark) { :root { color-scheme: dark; background: #1c1510; color: #fff4ea; --page-start: #24170f; --page-end: #100b08; --panel: #27190f; --edge: #54331c; --muted: #cdb5a0; --accent: #ff9a3d; --accent-soft: #5c3218; --shadow: rgba(0, 0, 0, 0.34); } }
          @media (prefers-reduced-motion: reduce) { .scene * { animation: none !important; } }
          .dashboard { width: 7.2rem; height: 5.6rem; border: 1px solid var(--edge); border-radius: 0.75rem; background: var(--panel); box-shadow: 0 1.25rem 2.5rem var(--shadow); padding: 0.8rem; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 0.55rem; }
          .panel { border-radius: 0.45rem; background: var(--accent-soft); position: relative; overflow: hidden; } .panel:first-child { grid-row: span 2; }
          .panel::after { content: ""; position: absolute; inset: auto 0.5rem 0.55rem; height: 0.45rem; border-radius: 999px; background: var(--accent); animation: panel-fill 1.8s ease-in-out infinite; }
          .panel:nth-child(2)::after { animation-delay: 0.25s; } .panel:nth-child(3)::after { animation-delay: 0.5s; }
          @keyframes panel-fill { 50% { transform: translateY(-1.4rem); } }
        </style>
      </head>
      <body>
        <main aria-live="polite">
          <div class="scene" aria-hidden="true">
            <div class="dashboard"><span class="panel"></span><span class="panel"></span><span class="panel"></span></div>
          </div>
          <h1>Grafana is warming up</h1>
          <p>The service is being started; it may take a few minutes. This page will refresh automatically.</p>
        </main>
      </body>
    </html>
