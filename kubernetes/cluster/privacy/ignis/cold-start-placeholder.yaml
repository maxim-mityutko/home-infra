---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ignis-cold-start-placeholder
  namespace: privacy
  labels:
    http.keda.sh/response-body: "true"
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Ignis is starting</title>
        <style>
          :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #172033; --page-start: #f8fbff; --page-end: #eef3f8; --panel: #fff; --edge: #d8e0ea; --muted: #5d697c; --accent: #6d4aff; --accent-soft: #e3dcff; --shadow: rgba(23, 32, 51, 0.14); }
          * { box-sizing: border-box; }
          body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 35%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 32rem), linear-gradient(180deg, var(--page-start) 0%, var(--page-end) 100%); }
          main { display: grid; justify-items: center; gap: 1.15rem; padding: 1.5rem; text-align: center; inline-size: min(100%, 28rem); }
          .scene { position: relative; width: 9rem; height: 8rem; display: grid; place-items: center; }
          h1 { margin: 0; font-size: 1.35rem; line-height: 1.2; font-weight: 800; letter-spacing: 0; }
          p { margin: 0; color: var(--muted); font-size: 0.98rem; line-height: 1.5; }
          @media (prefers-color-scheme: dark) { :root { color-scheme: dark; background: #151326; color: #f2f0ff; --page-start: #211b3d; --page-end: #0d0b16; --panel: #18162a; --edge: #3c345e; --muted: #b8b1d0; --accent: #a590ff; --accent-soft: #342a62; --shadow: rgba(0, 0, 0, 0.34); } }
          @media (prefers-reduced-motion: reduce) { .scene * { animation: none !important; } }
          .notebook { width: 6.4rem; height: 5.4rem; border: 1px solid var(--edge); border-radius: 0.75rem; background: var(--panel); box-shadow: 0 1.25rem 2.5rem var(--shadow); padding: 0.9rem 1rem; display: grid; align-content: center; gap: 0.5rem; position: relative; overflow: hidden; }
          .notebook::before { content: ""; position: absolute; inset-block: 0; left: 0.85rem; width: 0.2rem; background: var(--accent); opacity: 0.85; }
          .note-line { height: 0.42rem; border-radius: 999px; background: var(--accent-soft); animation: note-glow 1.8s ease-in-out infinite; }
          .note-line:nth-child(1) { width: 78%; } .note-line:nth-child(2) { width: 58%; animation-delay: 0.15s; } .note-line:nth-child(3) { width: 86%; animation-delay: 0.3s; }
          .spark { position: absolute; right: 0.9rem; top: 0.8rem; width: 0.75rem; height: 0.75rem; border-radius: 50%; background: var(--accent); animation: spark-pulse 1.4s ease-in-out infinite; }
          @keyframes note-glow { 50% { background: var(--accent); transform: translateX(0.2rem); } }
          @keyframes spark-pulse { 50% { transform: scale(1.45); opacity: 0.45; } }
        </style>
      </head>
      <body>
        <main aria-live="polite">
          <div class="scene" aria-hidden="true">
            <div class="notebook"><span class="spark"></span><span class="note-line"></span><span class="note-line"></span><span class="note-line"></span></div>
          </div>
          <h1>Ignis is warming up</h1>
          <p>The service is being started; it may take a few minutes. This page will refresh automatically.</p>
        </main>
      </body>
    </html>
