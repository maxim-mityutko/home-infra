---
apiVersion: v1
kind: ConfigMap
metadata:
  name: invidious-cold-start-placeholder
  namespace: privacy
  labels:
    http.keda.sh/response-body: "true"
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Invidious is starting</title>
        <style>
          :root { color-scheme: light dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #172033; --panel: #fff; --edge: #d8e0ea; --muted: #5d697c; --accent: #cc0000; --accent-soft: #ffd6d6; }
          * { box-sizing: border-box; }
          body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 35%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 32rem), linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%); }
          main { display: grid; justify-items: center; gap: 1.15rem; padding: 1.5rem; text-align: center; inline-size: min(100%, 28rem); }
          .scene { position: relative; width: 9rem; height: 8rem; display: grid; place-items: center; }
          h1 { margin: 0; font-size: 1.35rem; line-height: 1.2; font-weight: 800; letter-spacing: 0; }
          p { margin: 0; color: var(--muted); font-size: 0.98rem; line-height: 1.5; }
          @media (prefers-reduced-motion: reduce) { .scene * { animation: none !important; } }
          .screen { width: 7.2rem; height: 4.6rem; border: 1px solid var(--edge); border-radius: 0.7rem; background: var(--panel); box-shadow: 0 1.25rem 2.5rem rgba(23, 32, 51, 0.14); position: relative; overflow: hidden; }
          .screen::before { content: ""; position: absolute; inset: 1.45rem 3rem; clip-path: polygon(0 0, 100% 50%, 0 100%); background: var(--accent); animation: play-pulse 2s ease-in-out infinite; }
          .screen::after { content: ""; position: absolute; left: 0.8rem; right: 0.8rem; bottom: 0.7rem; height: 0.35rem; border-radius: 999px; background: var(--accent-soft); box-shadow: inset 2.4rem 0 0 var(--accent); animation: scrub 2.2s ease-in-out infinite; }
          @keyframes play-pulse { 50% { transform: scale(1.07); } }
          @keyframes scrub { 50% { box-shadow: inset 5.2rem 0 0 var(--accent); } }
        </style>
      </head>
      <body>
        <main aria-live="polite">
          <div class="scene" aria-hidden="true">
            <div class="screen"></div>
          </div>
          <h1>Invidious is warming up</h1>
          <p>The service is being started; it may take a few minutes. This page will refresh automatically.</p>
        </main>
      </body>
    </html>
