---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-cold-start-placeholder
  namespace: privacy
  labels:
    http.keda.sh/response-body: "true"
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SearXNG is starting</title>
        <style>
          :root { color-scheme: light dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #172033; --panel: #fff; --edge: #d8e0ea; --muted: #5d697c; --accent: #3050ff; --accent-soft: #dbe3ff; }
          * { box-sizing: border-box; }
          body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: radial-gradient(circle at 50% 35%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 32rem), linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%); }
          main { display: grid; justify-items: center; gap: 1.15rem; padding: 1.5rem; text-align: center; inline-size: min(100%, 28rem); }
          .scene { position: relative; width: 9rem; height: 8rem; display: grid; place-items: center; }
          h1 { margin: 0; font-size: 1.35rem; line-height: 1.2; font-weight: 800; letter-spacing: 0; }
          p { margin: 0; color: var(--muted); font-size: 0.98rem; line-height: 1.5; }
          @media (prefers-reduced-motion: reduce) { .scene * { animation: none !important; } }
          .lens { width: 5.7rem; height: 5.7rem; border: 0.65rem solid var(--accent); border-radius: 50%; background: var(--panel); box-shadow: 0 1.25rem 2.5rem rgba(23, 32, 51, 0.14); position: relative; }
          .lens::before { content: ""; position: absolute; width: 2.6rem; height: 0.65rem; right: -2rem; bottom: -0.55rem; border-radius: 999px; background: var(--accent); transform: rotate(45deg); }
          .lens::after { content: ""; position: absolute; inset: 1rem; border-radius: 50%; border: 0.35rem solid var(--accent-soft); border-top-color: var(--accent); animation: search-spin 1.6s linear infinite; }
          @keyframes search-spin { to { transform: rotate(360deg); } }
        </style>
      </head>
      <body>
        <main aria-live="polite">
          <div class="scene" aria-hidden="true">
            <div class="lens"></div>
          </div>
          <h1>SearXNG is warming up</h1>
          <p>The service is being started; it may take a few minutes. This page will refresh automatically.</p>
        </main>
      </body>
    </html>
