# Drive
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: bookmarks
  namespace: privacy
  labels:
    app.kubernetes.io/name: x-privacy-shared
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: nfs
  resources:
    requests:
      storage: 5G
  selector:
    matchLabels:
      storage.target:  bookmarks
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name:  bookmarks
  namespace: privacy
  labels:
    app.kubernetes.io/name: x-privacy-shared
    storage.target: bookmarks
spec:
  accessModes:
    - ReadOnlyMany
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  capacity:
    storage: 5G
  nfs:
    server: nas.brhd.io
    path: /mnt/spin/service/bookmarks
  mountOptions:
    - nfsvers=4.1
